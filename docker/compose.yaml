services:
  web:
    # Serve the pre-built assets in ../dist with nginx.
    # Build them first: `pnpm build` (or `make build`), then `docker compose up web`.
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      # Production build output from Vite (read-only).
      - ../dist:/usr/share/nginx/html:ro
      # SPA-friendly nginx config (falls back to index.html).
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
    depends_on:
      - lgtm

  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
    environment:
      # Land on the app dashboard when opening Grafana.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/frontend-telemetry.json
    volumes:
      # Provisioning provider config + dashboard JSON files (auto-imported on startup).
      - ./grafana/provisioning/dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/custom:ro
