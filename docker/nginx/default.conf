server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Single Page Application fallback: serve index.html for unknown routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite's content-hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
