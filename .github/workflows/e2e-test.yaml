name: e2e-test

on:
  push:
    branches:
      - "main"
      - "feature/**"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  e2e-test:
    strategy:
      matrix:
        platform:
          - "ubuntu-latest"
          # - 'macos-latest'
          # - 'windows-latest'
        node-version:
          - "24.10.0"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # to retrieve git tags
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Run E2E CI tests
        shell: bash
        run: |
          make ci-test-e2e
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
